<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YRS</title>
  <meta name="description" content="YRS® Brand. We create apparel that motivates and inspires the individual to be great &amp; Enjoy life while you listen to your favorite music, skateboarding down the street, or in flight to your next destination..." />
  <meta name="keywords" content="yrs,yrsbrand,everythingisyrs,apparel,clothing" />
  <link href="https://fonts.googleapis.com/css?family=Six+Caps&display=swap" rel="stylesheet" type="text/css" />
  <style>
    /* Font fallback stack — if Google Fonts fails, use system fonts */
    @font-face {
      font-family: 'Six Caps';
      src: local('Six Caps'), local('SixCaps');
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>
  <div id="site-loader">
    <div style="text-align:center;">
      YRS
      <div class="spinner"></div>
    </div>
  </div>
  <div id="center"></div>
  <script>
    // Masonry layout for post grid
    function masonryLayout() {
      var container = document.getElementById('container');
      if (!container) return;
      var posts = container.querySelectorAll('.post');
      if (!posts.length) return;
      var colW = 330;
      var cols = Math.max(1, Math.floor(container.offsetWidth / colW));
      var colHeights = new Array(cols).fill(0);
      posts.forEach(function (post) {
        var shortest = 0;
        for (var i = 1; i < cols; i++) {
          if (colHeights[i] < colHeights[shortest]) shortest = i;
        }
        post.style.position = 'absolute';
        post.style.left = (shortest * colW) + 'px';
        post.style.top = colHeights[shortest] + 'px';
        colHeights[shortest] += post.offsetHeight + 15;
      });
      var maxH = Math.max.apply(null, colHeights);
      container.style.position = 'relative';
      container.style.height = maxH + 'px';
    }
    window.addEventListener('resize', masonryLayout);
    window.addEventListener('load', function () { setTimeout(masonryLayout, 100); });
  </script>
  <script src="site.js"></script>
  <script src="ui.js"></script>
  <script src="admin.js"></script>
</body>
</html>
