    /* Font fallback stack — if Google Fonts fails, use system fonts */
    @font-face {
      font-family: 'Six Caps';
      src: local('Six Caps'), local('SixCaps');
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="style.css" />

</head>
<body>
  <div id="site-loader">
    <div style="text-align:center;">
      YRS
      <div class="spinner"></div>
    </div>
  </div>
  <div id="center"></div>
  <script>
    /* ── Grid Layout via CSS Grid — auto-fill + centering ─── */
    function masonryLayout() {
      var c = document.getElementById('container');
      if (!c) return;

      /* Nuke any leftover inline styles from old masonry */
      var posts = c.querySelectorAll('.post');
      for (var i = 0; i < posts.length; i++) {
        posts[i].style.position = '';
        posts[i].style.left = '';
        posts[i].style.top = '';
        posts[i].style.float = '';
        posts[i].style.margin = '';
        posts[i].style.width = '';
        posts[i].style.display = '';
      }

      /* Pure CSS grid — browser handles ALL positioning & centering */
      c.style.display = 'grid';
      c.style.gridTemplateColumns = 'repeat(auto-fill, 320px)';
      c.style.justifyContent = 'center';
      c.style.gap = '30px';
      c.style.columnCount = ''; /* remove old column-count if present */
    }
    window.addEventListener('resize', masonryLayout);
    window.addEventListener('load', function(){ setTimeout(masonryLayout,100); });
  </script>
  <script src="site.js"></script>
  <script src="ui.js"></script>
  <script src="admin.js"></script>
</body>
</html>
