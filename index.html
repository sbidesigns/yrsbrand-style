<body>
  <div id="site-loader">
    <div style="text-align:center;">
      YRS
      <div class="spinner"></div>
    </div>
  </div>
  <div id="center"></div>
  <script>
    function masonryLayout() {
      var container = document.getElementById('container');
      if (!container) return;

      // Nuke old inner wrapper if exists — pull posts back to container
      var oldInner = document.getElementById('masonry-inner');
      if (oldInner) {
        while (oldInner.firstChild) container.appendChild(oldInner.firstChild);
        oldInner.parentNode.removeChild(oldInner);
      }

      var posts = container.querySelectorAll('.post');
      if (!posts.length) return;

      var colW = 330;
      var gap = 15;

      // RESET container — use setProperty with 'important' to beat CSS !important rules
      container.style.position = 'relative';
      container.style.height = 'auto';
      container.style.minHeight = '';
      container.style.width = '100%';
      container.style.maxWidth = '1050px';
      container.style.marginLeft = 'auto';
      container.style.marginRight = 'auto';
      // This beats #container { text-align:-webkit-center !important }
      container.setProperty ? container.style.setProperty('text-align','center','important')
                            : container.style.textAlign = 'center';

      var containerWidth = container.offsetWidth || container.clientWidth || 1050;
      var cols = Math.max(1, Math.floor((containerWidth + gap) / (colW + gap)));
      var colHeights = new Array(cols).fill(0);
      var totalContentW = (cols * colW) + ((cols - 1) * gap);

      // Create inner wrapper — the key to reliable centering
      var inner = document.createElement('div');
      inner.id = 'masonry-inner';
      inner.cssText = '';
      inner.style.position = 'relative';
      inner.style.width = totalContentW + 'px';
      inner.style.display = 'inline-block';   // centers inside text-align:center parent
      inner.style.verticalAlign = 'top';
      inner.style.textAlign = 'left';

      // Move ALL posts into inner wrapper
      Array.prototype.forEach.call(posts, function (p) { inner.appendChild(p); });
      container.appendChild(inner);

      // Now position posts absolutely INSIDE inner wrapper
      posts = inner.querySelectorAll('.post');
      posts.forEach(function (post) {
        post.style.float = 'none';
        post.style.margin = '0';
        post.style.position = 'absolute';

        var shortest = 0;
        for (var i = 1; i < cols; i++) {
          if (colHeights[i] < colHeights[shortest]) shortest = i;
        }
        post.style.left = (shortest * (colW + gap)) + 'px';
        post.style.top = colHeights[shortest] + 'px';
        colHeights[shortest] += post.offsetHeight + gap;
      });

      var maxH = Math.max.apply(null, colHeights);
      if (maxH > 0) inner.style.height = maxH + 'px';
    }
    window.addEventListener('resize', masonryLayout);
    window.addEventListener('load', function () { setTimeout(masonryLayout, 150); });
  </script>
  <script src="site.js"></script>
  <script src="ui.js"></script>
  <script src="admin.js"></script>
</body>
