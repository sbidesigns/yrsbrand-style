<body>
  <div id="site-loader">
    <div style="text-align:center;">
      YRS
      <div class="spinner"></div>
    </div>
  </div>
  <div id="center"></div>
  <script>
    function masonryLayout() {
      var container = document.getElementById('container');
      if (!container) return;

      // If posts are stuck in an old inner wrapper, pull them back to container
      var oldInner = document.getElementById('masonry-inner');
      if (oldInner) {
        while (oldInner.firstChild) container.appendChild(oldInner.firstChild);
        oldInner.parentNode.removeChild(oldInner);
      }

      var posts = container.querySelectorAll('.post');
      if (!posts.length) return;

      var colW = 330;
      var gap = 15;

      // Container setup
      container.style.position = 'relative';
      container.style.height = 'auto';
      container.style.minHeight = '';
      container.style.textAlign = 'left'; /* reset from -webkit-center */

      var containerWidth = container.offsetWidth;
      var cols = Math.max(1, Math.floor((containerWidth + gap) / (colW + gap)));
      var colHeights = new Array(cols).fill(0);

      // Calculate total content width & centering offset
      var totalContentW = (cols * colW) + ((cols - 1) * gap);
      var offsetX = Math.max(0, (containerWidth - totalContentW) / 2);

      posts.forEach(function (post) {
        // Force absolute positioning — no float, no margin
        post.style.float = 'none';
        post.style.margin = '0';
        post.style.position = 'absolute';

        // Find shortest column
        var shortest = 0;
        for (var i = 1; i < cols; i++) {
          if (colHeights[i] < colHeights[shortest]) shortest = i;
        }

        // Position WITH centering offset baked in
        post.style.left = (offsetX + shortest * (colW + gap)) + 'px';
        post.style.top = colHeights[shortest] + 'px';
        colHeights[shortest] += post.offsetHeight + gap;
      });

      // Set container height to fit all posts
      var maxH = Math.max.apply(null, colHeights);
      if (maxH > 0) container.style.height = maxH + 'px';
    }
    window.addEventListener('resize', masonryLayout);
    window.addEventListener('load', function () { setTimeout(masonryLayout, 100); });
  </script>
  <script src="site.js"></script>
  <script src="ui.js"></script>
  <script src="admin.js"></script>
</body>
