<body>
  <div id="site-loader">
    <div style="text-align:center;">
      YRS
      <div class="spinner"></div>
    </div>
  </div>
  <div id="center"></div>
  <script>
    /* ── Masonry Layout — offset-based centering at ALL viewport sizes ─── */
    function masonryLayout() {
      var c = document.getElementById('container');
      if (!c) return;

      /* Nuke ANY leftover inline styles from old masonry attempts */
      var posts = c.querySelectorAll('.post');
      for (var i = 0; i < posts.length; i++) {
        posts[i].style.position = '';
        posts[i].style.left = '';
        posts[i].style.top = '';
        posts[i].style.float = '';
        posts[i].style.margin = '';
        posts[i].style.width = '';
        posts[i].style.display = '';
      }

      /* Reset container to clean state */
      c.style.display = '';
      c.style.gridTemplateColumns = '';
      c.style.justifyContent = '';
      c.style.gap = '';
      c.style.columnCount = '';
      c.style.paddingLeft = '';
      c.style.paddingRight = '';

      /* Calculate how many columns fit */
      var containerWidth = c.offsetWidth || window.innerWidth;
      var postWidth = 320;
      var gap = 30;
      var colUnit = postWidth + gap; /* 350px per column slot */
      var cols = Math.max(1, Math.floor(containerWidth / colUnit));

      /* Total actual content width */
      var totalContent = (cols * postWidth) + ((cols - 1) * gap);

      /* Calculate equal left/right padding to CENTER the content */
      var offset = Math.max(0, (containerWidth - totalContent) / 2);

      /* Apply centering via padding */
      c.style.paddingLeft = offset + 'px';
      c.style.paddingRight = offset + 'px';
    }
    window.addEventListener('resize', masonryLayout);
    window.addEventListener('load', function(){ setTimeout(masonryLayout,100); });
  </script>
  <script src="site.js"></script>
  <script src="ui.js"></script>

</body>
